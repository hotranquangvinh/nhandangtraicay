services:
  fruit-detector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fruit-detector
    ports:
      - "7860:7860"
    environment:
      HOST: 0.0.0.0
      PORT: 7860
      FLASK_DEBUG: 0
      ALLOW_BASE_MODEL: 0
      VERIFY_FRUIT_MODEL: 1
      MODEL_PATH: runs/detect/train19/weights/best.pt
    restart: unless-stopped
